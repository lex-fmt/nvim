name: CI

# Thin caller of arthur-debert/release/.github/workflows/nvim-plugin-ci.yml,
# plus a sibling Lua lint job (luacheck — not in the canonical because
# only this consumer needs it).

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    uses: arthur-debert/release/.github/workflows/nvim-plugin-ci.yml@v1
    with:
      # Pre-check fetches the pinned lexd-lsp + tree-sitter source +
      # verifies the generated theme matches comms.
      pre-check: app-bin/ci-fetch-deps.sh
      check-command: 'cd test && TERM=dumb LEX_TREESITTER_PATH=/tmp/tree-sitter-lex bash run_tests.sh'
      submodules: true

  # luacheck is nvim-plugin-specific; the canonical nvim-plugin-ci.yml
  # doesn't carry it. Kept inline. Note `|| true` — historically
  # warnings-only.
  lint:
    name: Lua Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.3 liblua5.3-dev luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ --no-unused-args --no-max-line-length || true
