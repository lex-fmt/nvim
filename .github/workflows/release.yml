name: Release

# Thin caller of arthur-debert/release/.github/workflows/nvim-plugin.yml@v1.
# All the version-bump + tag + push + GH-release logic lives there;
# this file carries the bindings (input, secrets, trigger contract).
#
# Replaces the prior hand-rolled, tag-push-triggered workflow. New trigger
# contract: workflow_dispatch — matches the cross-repo cascade-handler
# pattern the release-lex orchestrator drives.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.11.0 or 1.0.0-rc.1). No leading v.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: arthur-debert/release/.github/workflows/nvim-plugin.yml@v1
    with:
      version: ${{ inputs.version }}
      # changelog-path: '' — this repo's CHANGELOG uses lexed-style
      # `## vX.Y.Z (YYYY-MM-DD)` (not bracketed Keep-a-Changelog).
      # scripts/release/update-release rolls UNRELEASED.md into
      # CHANGELOG with that heading style as part of the cascade
      # flow (on-upstream-released.yml). The reusable workflow's
      # CHANGELOG awk regex expects strict `## [<v>] - <date>`, so
      # we disable changelog handling at the workflow level — the
      # workflow just tags + creates the GH release with default
      # "Release v<v>" notes. Aligning CHANGELOG format is a
      # separate follow-up that needs to touch update-release too.
      changelog-path: ''
      # version-file: the canonical Lua plugin convention is to
      # carry a runtime version constant in `lua/<name>/init.lua`;
      # the workflow bumps it via perl to stay in sync with the tag.
      # Otherwise plugin code reading `require("lex").version`
      # drifts behind the published tag.
      version-file: lua/lex/init.lua
      # submodules: true — comms/ is a submodule and the plugin
      # sanity check needs the full tree.
      submodules: true
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
